version: "2"

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
  # Explicitly disable problematic linters
  disable:
    - errcheck
    - staticcheck
    - unused
    - ineffassign

linters-settings:
  govet:
    enable:
      - assign
      - atomic
      - bools
      - buildtag
      - cgocall
      - composites
      - copylocks
      - httpresponse
      - loopclosure
      - lostcancel
      - nilfunc
      - printf
      - shift
      - stdmethods
      - structtag
      - tests
      - unmarshal
      - unreachable
      - unsafeptr
      - unusedresult
    disable:
      - shadow
      - fieldalignment

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
