syntax = "proto3";

package kvstore;

option go_package = "github.com/RashikAnsar/raftkv/api/proto;proto";

// KVStore service provides high-performance RPC for key-value operations
service KVStore {
  // Get retrieves the value for a given key
  rpc Get(GetRequest) returns (GetResponse);

  // Put stores a key-value pair
  rpc Put(PutRequest) returns (PutResponse);

  // Delete removes a key-value pair
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // List returns keys matching a prefix
  rpc List(ListRequest) returns (ListResponse);

  // CompareAndSwap atomically updates a key if the version matches
  rpc CompareAndSwap(CompareAndSwapRequest) returns (CompareAndSwapResponse);

  // GetWithVersion retrieves the value and version for a key
  rpc GetWithVersion(GetWithVersionRequest) returns (GetWithVersionResponse);

  // GetStats returns store statistics
  rpc GetStats(StatsRequest) returns (StatsResponse);

  // GetLeader returns the current Raft leader
  rpc GetLeader(LeaderRequest) returns (LeaderResponse);

  // GetLeadershipInfo returns detailed leadership information
  rpc GetLeadershipInfo(LeadershipInfoRequest) returns (LeadershipInfoResponse);

  // Stepdown forces the leader to step down
  rpc Stepdown(StepdownRequest) returns (StepdownResponse);

  // TransferLeadership transfers leadership to a specific node
  rpc TransferLeadership(TransferLeadershipRequest) returns (TransferLeadershipResponse);

  // GetElectionHistory returns the history of leadership changes
  rpc GetElectionHistory(ElectionHistoryRequest) returns (ElectionHistoryResponse);

  // GetTTL returns the remaining TTL for a key
  rpc GetTTL(GetTTLRequest) returns (GetTTLResponse);

  // SetTTL updates the TTL for an existing key
  rpc SetTTL(SetTTLRequest) returns (SetTTLResponse);

  // Watch subscribes to real-time key-value change notifications
  rpc Watch(WatchRequest) returns (stream WatchEvent);
}

// GetRequest contains the key to retrieve
message GetRequest {
  string key = 1;
  // If true, ensures linearizable read from leader
  bool consistent = 2;
}

// GetResponse contains the retrieved value
message GetResponse {
  bytes value = 1;
  bool found = 2;
  // If read from follower, indicates potential staleness
  bool from_leader = 3;
}

// PutRequest contains the key-value pair to store
message PutRequest {
  string key = 1;
  bytes value = 2;
  // Optional TTL in seconds (0 = no expiration)
  int64 ttl_seconds = 3;
}

// PutResponse confirms the put operation
message PutResponse {
  bool success = 1;
  string error = 2;
  // The leader that processed the request
  string leader = 3;
}

// DeleteRequest contains the key to delete
message DeleteRequest {
  string key = 1;
}

// DeleteResponse confirms the delete operation
message DeleteResponse {
  bool success = 1;
  string error = 2;
  // The leader that processed the request
  string leader = 3;
}

// ListRequest contains parameters for listing keys
message ListRequest {
  string prefix = 1;              // Filter keys by prefix
  int32 limit = 2;                // Max number of keys to return (0 = unlimited, default: 100)
  string start = 3;               // Start of key range (inclusive, optional)
  string end = 4;                 // End of key range (inclusive, optional)
  string cursor = 5;              // Pagination cursor from previous response
  bool reverse = 6;               // Return keys in descending order
}

// ListResponse contains the matching keys
message ListResponse {
  repeated string keys = 1;       // Keys matching the query
  int32 total = 2;                // Number of keys in this response (deprecated, use count)
  int32 count = 3;                // Number of keys in this response
  bool has_more = 4;              // True if there are more results
  string next_cursor = 5;         // Cursor for next page (empty if no more results)
}

// StatsRequest requests store statistics
message StatsRequest {}

// StatsResponse contains store statistics
message StatsResponse {
  uint64 key_count = 1;
  uint64 get_count = 2;
  uint64 put_count = 3;
  uint64 delete_count = 4;
  string raft_state = 5; // "Leader", "Follower", "Candidate"
  string raft_leader = 6;
  uint64 raft_term = 7;
  uint64 raft_last_index = 8;
}

// LeaderRequest requests the current leader
message LeaderRequest {}

// LeaderResponse contains the current leader information
message LeaderResponse {
  string leader_id = 1;
  string leader_address = 2;
  bool is_leader = 3; // True if this node is the leader
}

// CompareAndSwapRequest contains the CAS operation parameters
message CompareAndSwapRequest {
  string key = 1;
  uint64 expected_version = 2;
  bytes new_value = 3;
}

// CompareAndSwapResponse contains the CAS operation result
message CompareAndSwapResponse {
  bool success = 1;
  uint64 current_version = 2; // Current version (either old if failed, or new if succeeded)
  string error = 3;
  string leader = 4; // The leader that processed the request
}

// GetWithVersionRequest contains the key to retrieve with version
message GetWithVersionRequest {
  string key = 1;
}

// GetWithVersionResponse contains the retrieved value and version
message GetWithVersionResponse {
  bytes value = 1;
  uint64 version = 2;
  bool found = 3;
}

// LeadershipInfoRequest requests detailed leadership information
message LeadershipInfoRequest {}

// LeadershipInfoResponse contains detailed leadership information
message LeadershipInfoResponse {
  // Current node information
  string node_id = 1;
  bool is_leader = 2;
  string state = 3; // "leader", "follower", "candidate", "shutdown"

  // Leader information
  string leader_id = 4;
  string leader_address = 5;

  // Raft state information
  uint64 term = 6;
  int64 last_contact_ms = 7;     // Milliseconds since last contact with leader (for followers)
  uint64 commit_index = 8;       // Last committed index
  uint64 applied_index = 9;      // Last applied index
  uint64 last_log_index = 10;    // Index of last log entry
  uint64 last_log_term = 11;     // Term of last log entry

  // Cluster information
  int32 num_peers = 12;          // Number of peers in cluster

  // Leadership stability
  int32 leadership_changes = 13; // Number of leadership changes
  int64 leader_stability_ms = 14; // How long current leader has been in office (milliseconds)
}

// StepdownRequest requests the leader to step down
message StepdownRequest {}

// StepdownResponse confirms the stepdown operation
message StepdownResponse {
  bool success = 1;
  string error = 2;
  string message = 3;
}

// TransferLeadershipRequest requests leadership transfer to a specific node
message TransferLeadershipRequest {
  string target_node_id = 1;
}

// TransferLeadershipResponse confirms the leadership transfer operation
message TransferLeadershipResponse {
  bool success = 1;
  string error = 2;
  string message = 3;
  string target_node_id = 4;
}

// ElectionHistoryRequest requests the election history
message ElectionHistoryRequest {}

// ElectionEvent represents a single leadership change event
message ElectionEvent {
  int64 timestamp_ms = 1;   // Unix timestamp in milliseconds
  string old_leader_id = 2;
  string new_leader_id = 3;
  uint64 term = 4;
  string reason = 5;        // "election", "stepdown", "transfer", etc.
}

// ElectionHistoryResponse contains the election history
message ElectionHistoryResponse {
  repeated ElectionEvent elections = 1;
  int32 count = 2;
}

// GetTTLRequest contains the key to get TTL for
message GetTTLRequest {
  string key = 1;
}

// GetTTLResponse contains the remaining TTL
message GetTTLResponse {
  int64 ttl_seconds = 1; // Remaining TTL in seconds (0 = no expiration, -1 = key not found)
  bool has_ttl = 2;      // True if key has a TTL set
  string error = 3;      // Error message if any
}

// SetTTLRequest contains the key and new TTL
message SetTTLRequest {
  string key = 1;
  int64 ttl_seconds = 2; // TTL in seconds (must be > 0)
}

// SetTTLResponse confirms the SetTTL operation
message SetTTLResponse {
  bool success = 1;
  string error = 2;
  string leader = 3; // The leader that processed the request
}

// WatchRequest subscribes to key-value change notifications
message WatchRequest {
  string key_prefix = 1;        // Watch keys with this prefix (empty = all keys)
  repeated string operations = 2; // Filter by operations: ["put", "delete", "cas", "put_ttl"]
  int64 start_revision = 3;     // Start watching from this Raft index (0 = current, ignored for now)
  bool send_initial_value = 4;  // Send current value before streaming changes
}

// WatchEvent represents a key-value change event
message WatchEvent {
  string key = 1;
  bytes value = 2;              // Empty for delete operations
  string operation = 3;         // "put", "delete", "cas", "put_ttl"
  uint64 raft_index = 4;        // Raft log index for ordering
  uint64 raft_term = 5;         // Raft term
  int64 timestamp = 6;          // Unix timestamp in nanoseconds
  uint64 version = 7;           // Key version (for CAS operations)
}
